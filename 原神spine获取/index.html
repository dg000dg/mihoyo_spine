<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Spine 提取预览器</title>
  <link rel="icon" type="image/png" sizes="32x32" href="https://esotericsoftware.com/files/branding/spine_badge.png">
  <link rel="shortcut icon" href="https://esotericsoftware.com/files/branding/spine_badge.png">
  <link rel="apple-touch-icon" href="https://esotericsoftware.com/files/branding/spine_badge.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/EsotericSoftware/spine-runtimes@3.8/spine-ts/player/css/spine-player.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@esotericsoftware/spine-player@4.2.73/dist/spine-player.min.css">
  <style>
    :root {
      --bg-0: #09131b;
      --bg-1: #102538;
      --panel: rgba(11, 22, 34, 0.86);
      --panel-strong: rgba(13, 27, 41, 0.94);
      --line: rgba(114, 197, 255, 0.18);
      --line-strong: rgba(114, 197, 255, 0.32);
      --text-0: #eef6ff;
      --text-1: #a3bbcf;
      --accent: #7fd1ff;
      --accent-strong: #4cb5f5;
      --danger: #ff8c7a;
      --success: #8de2b7;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.38);
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "Segoe UI Variable", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text-0);
      background:
        radial-gradient(circle at top left, rgba(89, 173, 255, 0.16), transparent 26%),
        radial-gradient(circle at right top, rgba(117, 237, 255, 0.12), transparent 24%),
        linear-gradient(140deg, var(--bg-0), var(--bg-1) 56%, #081017 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 26px 26px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.72), transparent 92%);
    }

    .app-shell {
      position: relative;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .corner-picker {
      position: fixed;
      top: 0;
      right: 0;
      width: 76px;
      height: 76px;
      padding: 0;
      border: 0;
      background:
        linear-gradient(135deg, rgba(127, 209, 255, 0.94), rgba(76, 181, 245, 0.92));
      clip-path: polygon(100% 0, 0 0, 100% 100%);
      box-shadow: -10px 10px 30px rgba(2, 14, 24, 0.24);
      cursor: pointer;
      z-index: 90;
      transition: transform 0.2s ease, filter 0.2s ease;
    }

    .corner-picker:hover,
    .corner-picker:focus-visible {
      transform: translateY(-1px);
      filter: brightness(1.06);
      outline: none;
    }

    .corner-picker__glyph {
      position: absolute;
      top: 11px;
      right: 12px;
      width: 24px;
      height: 24px;
      display: block;
      background-image: url("https://genshin.hoyoverse.com/favicon.ico");
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;
      color: transparent;
      font-size: 0;
      line-height: 0;
      filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.2));
    }

    .corner-picker__glyph::after {
      content: "";
      position: absolute;
      right: -2px;
      bottom: -2px;
      width: 0;
      height: 0;
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-top: 6px solid rgba(5, 32, 50, 0.85);
    }

    .activity-picker {
      position: fixed;
      inset: 0;
      z-index: 130;
      display: flex;
      align-items: stretch;
      justify-content: flex-end;
      padding: 0;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.22s ease, visibility 0.22s ease;
    }

    .activity-picker.is-active {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .activity-picker__backdrop {
      position: absolute;
      inset: 0;
      background: transparent;
    }

    .activity-picker__panel {
      position: relative;
      width: clamp(380px, 33.333vw, 620px);
      height: 100%;
      max-height: none;
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 20px 18px 18px;
      border-radius: 26px 0 0 26px;
      border-top: 0;
      border-right: 0;
      border-bottom: 0;
      border-left: 1px solid rgba(127, 209, 255, 0.18);
      background:
        radial-gradient(circle at top right, rgba(127, 209, 255, 0.14), transparent 34%),
        linear-gradient(180deg, rgba(76, 181, 245, 0.08), rgba(76, 181, 245, 0)),
        rgba(10, 20, 31, 0.96);
      box-shadow: -24px 0 60px rgba(0, 0, 0, 0.28);
      overflow: hidden;
      transform: translateX(16px);
      transition: transform 0.22s ease;
    }

    .activity-picker__resize {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 16px;
      padding: 0;
      border: 0;
      background: transparent;
      cursor: ew-resize;
      z-index: 2;
    }

    .activity-picker__resize::before {
      content: "";
      position: absolute;
      left: 4px;
      top: 50%;
      width: 4px;
      height: 68px;
      border-radius: 999px;
      transform: translateY(-50%);
      background:
        linear-gradient(180deg, rgba(127, 209, 255, 0.18), rgba(127, 209, 255, 0.5), rgba(127, 209, 255, 0.18));
      box-shadow: 0 0 18px rgba(76, 181, 245, 0.18);
      transition: background 0.2s ease, box-shadow 0.2s ease;
    }

    .activity-picker__resize:hover::before,
    .activity-picker__resize:focus-visible::before {
      background:
        linear-gradient(180deg, rgba(127, 209, 255, 0.34), rgba(127, 209, 255, 0.72), rgba(127, 209, 255, 0.34));
      box-shadow: 0 0 24px rgba(76, 181, 245, 0.28);
    }

    .activity-picker__resize:focus-visible {
      outline: none;
    }

    .activity-picker.is-active .activity-picker__panel {
      transform: translateX(0);
    }

    .activity-picker__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .activity-picker__title {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0.02em;
    }

    .activity-picker__meta {
      margin: 4px 0 0;
      color: var(--text-1);
      font-size: 12px;
      line-height: 1.6;
    }

    .activity-picker__close {
      width: 34px;
      height: 34px;
      padding: 0;
      border-radius: 999px;
      border: 1px solid rgba(127, 209, 255, 0.18);
      background: rgba(7, 17, 27, 0.82);
      color: var(--text-0);
      font: inherit;
      cursor: pointer;
    }

    .activity-picker__close:hover,
    .activity-picker__close:focus-visible {
      border-color: rgba(127, 209, 255, 0.32);
      outline: none;
    }

    .activity-picker__list {
      min-height: 240px;
      max-height: none;
      flex: 1;
      padding-right: 4px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
    }

    .activity-picker__empty {
      min-height: 240px;
      display: grid;
      place-items: center;
      padding: 20px;
      text-align: center;
      color: var(--text-1);
      border: 1px dashed rgba(127, 209, 255, 0.16);
      border-radius: 16px;
      background: rgba(7, 17, 27, 0.28);
      line-height: 1.8;
    }

    .activity-picker__empty[hidden] {
      display: none;
    }

    body.is-resizing-activity-picker,
    body.is-resizing-activity-picker * {
      cursor: ew-resize !important;
      user-select: none !important;
    }

    .activity-option {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 14px;
      border: 1px solid rgba(127, 209, 255, 0.12);
      border-radius: 16px;
      background: rgba(7, 17, 27, 0.48);
      cursor: pointer;
      transition: border-color 0.2s ease, transform 0.2s ease, background 0.2s ease;
    }

    .activity-option:hover,
    .activity-option:focus-within {
      border-color: rgba(127, 209, 255, 0.28);
      background: rgba(7, 17, 27, 0.66);
      transform: translateY(-1px);
    }

    .activity-option input[type="radio"] {
      margin: 4px 0 0;
      accent-color: var(--accent-strong);
    }

    .activity-option__body {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .activity-option__name {
      color: var(--text-0);
      font-size: 14px;
      font-weight: 600;
      line-height: 1.5;
    }

    .activity-option__url {
      color: var(--text-1);
      font-size: 12px;
      line-height: 1.6;
      word-break: break-all;
    }

    .hero,
    .status-panel,
    .grid-shell {
      border: 1px solid var(--line);
      border-radius: 22px;
      background: var(--panel);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 18px;
      display: grid;
      gap: 12px;
    }

    .hero-title {
      margin: 0;
      font-size: clamp(24px, 3vw, 34px);
      letter-spacing: 0.04em;
    }

    .hero-subtitle {
      margin: 0;
      color: var(--text-1);
      line-height: 1.7;
    }

    .input-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: stretch;
    }

    .action-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .url-input,
    .action-button {
      min-height: 48px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(7, 17, 27, 0.82);
      color: var(--text-0);
      font: inherit;
      transition: border-color 0.2s ease, transform 0.2s ease, background 0.2s ease;
    }

    .url-input {
      width: 100%;
      padding: 0 16px;
    }

    .url-input::placeholder {
      color: rgba(238, 246, 255, 0.46);
    }

    .action-button {
      min-width: 116px;
      padding: 0 18px;
      cursor: pointer;
      font-weight: 700;
      background:
        linear-gradient(135deg, rgba(76, 181, 245, 0.24), rgba(127, 209, 255, 0.08)),
        rgba(7, 17, 27, 0.82);
    }

    .url-input:hover,
    .url-input:focus,
    .action-button:hover {
      border-color: var(--line-strong);
      outline: none;
      transform: translateY(-1px);
    }

    .action-button:disabled,
    .url-input:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      transform: none;
    }

    .hidden-file-input {
      display: none;
    }

    .status-panel {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .status-main {
      min-width: min(100%, 320px);
      flex: 1 1 360px;
      display: flex;
      align-items: center;
    }

    .status-text {
      margin: 0;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: nowrap;
      color: var(--text-1);
      line-height: 1.6;
    }

    .status-text__label {
      min-width: 0;
      white-space: pre-line;
    }

    .status-text[data-tone="success"] {
      color: var(--success);
    }

    .status-text[data-tone="error"] {
      color: var(--danger);
    }

    .status-text[data-tone="loading"] {
      color: var(--accent);
    }

    .gif-export-status {
      display: none;
      flex: 0 1 auto;
      gap: 10px;
      min-width: 0;
      max-width: min(100%, 620px);
    }

    .gif-export-status.is-active {
      display: inline-flex;
      align-items: center;
    }

    .gif-export-status[hidden] {
      display: none !important;
    }

    .gif-export-status__label {
      flex: 0 1 auto;
      min-width: 0;
      max-width: min(36vw, 400px);
      color: inherit;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .gif-export-status__track {
      width: 122px;
      flex: 0 0 122px;
    }

    .gif-export-status__value,
    .toolbar-export-progress__value {
      display: inline-block;
      flex: 0 0 auto;
      min-width: 32px;
      color: var(--accent);
      font-size: 11px;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      text-align: right;
    }

    .mini-progress-track {
      display: block;
      position: relative;
      height: 6px;
      border-radius: 999px;
      overflow: hidden;
      background:
        linear-gradient(90deg, rgba(127, 209, 255, 0.12), rgba(127, 209, 255, 0.06));
      box-shadow: inset 0 0 0 1px rgba(127, 209, 255, 0.08);
    }

    .mini-progress-fill {
      display: block;
      width: 0;
      height: 100%;
      border-radius: inherit;
      background:
        linear-gradient(90deg, rgba(114, 240, 255, 0.95), rgba(127, 209, 255, 0.96) 46%, rgba(76, 181, 245, 0.98));
      box-shadow: 0 0 18px rgba(76, 181, 245, 0.42);
      transition: width 0.22s ease;
    }

    .status-badges {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .badge {
      min-height: 32px;
      display: inline-flex;
      align-items: center;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(7, 17, 27, 0.76);
      color: var(--text-1);
      font-size: 13px;
      white-space: nowrap;
    }

    .grid-shell {
      padding: 16px;
    }

    .spine-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
    }

    .empty-state {
      min-height: 280px;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
      color: var(--text-1);
      line-height: 1.8;
      border: 1px dashed rgba(127, 209, 255, 0.18);
      border-radius: 18px;
      background:
        radial-gradient(circle at center, rgba(127, 209, 255, 0.08), transparent 46%),
        rgba(7, 17, 27, 0.35);
    }

    .spine-card {
      min-width: 0;
      border: 1px solid rgba(127, 209, 255, 0.14);
      border-radius: 18px;
      background: var(--panel-strong);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 300px;
    }

    .spine-toolbar {
      min-height: 42px;
      padding: 8px 10px;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto auto auto;
      gap: 6px;
      align-items: center;
      border-bottom: 1px solid rgba(127, 209, 255, 0.12);
      background:
        linear-gradient(180deg, rgba(76, 181, 245, 0.08), rgba(76, 181, 245, 0)),
        rgba(10, 20, 31, 0.92);
    }

    .download-check {
      width: 16px;
      height: 16px;
      margin: 0;
      accent-color: var(--accent-strong);
    }

    .spine-name {
      min-width: 0;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text-0);
    }

    .mini-select,
    .icon-button {
      min-width: 0;
      height: 26px;
      border-radius: 9px;
      border: 1px solid rgba(127, 209, 255, 0.18);
      background: rgba(7, 17, 27, 0.86);
      color: var(--text-0);
      font: inherit;
      font-size: 12px;
    }

    .mini-select {
      max-width: 84px;
      padding: 0 8px;
    }

    .icon-button {
      min-width: 40px;
      padding: 0 10px;
      cursor: pointer;
    }

    .toolbar-export-progress {
      display: none;
      align-items: center;
      gap: 8px;
      min-width: 114px;
      max-width: 136px;
    }

    .toolbar-export-progress[hidden] {
      display: none !important;
    }

    .toolbar-export-progress__track {
      flex: 1 1 auto;
      min-width: 74px;
    }

    .mini-select:hover,
    .mini-select:focus,
    .icon-button:hover {
      border-color: rgba(127, 209, 255, 0.32);
      outline: none;
    }

    .spine-preview {
      position: relative;
      flex: 1;
      min-height: 258px;
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(127, 209, 255, 0.08), transparent 36%),
        linear-gradient(180deg, rgba(9, 19, 29, 0.96), rgba(5, 12, 19, 0.98));
    }

    .spine-preview::before {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 14px;
      border: 1px solid rgba(127, 209, 255, 0.08);
      pointer-events: none;
    }

    .player-mount {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .player-mount,
    .player-mount > div,
    .player-mount .spine-player {
      width: 100%;
      height: 100%;
    }

    .player-mount canvas {
      width: 100% !important;
      height: 100% !important;
    }

    .card-overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 16px;
      text-align: center;
      color: var(--text-1);
      line-height: 1.7;
      background: rgba(6, 13, 20, 0.4);
      transition: opacity 0.2s ease, visibility 0.2s ease;
      white-space: pre-line;
    }

    .card-overlay.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .spine-card-placeholder {
      min-height: 300px;
      border-radius: 18px;
      border: 1px dashed rgba(127, 209, 255, 0.12);
      background: rgba(7, 17, 27, 0.16);
    }

    .preview-modal {
      position: fixed;
      inset: 0;
      z-index: 120;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.22s ease, visibility 0.22s ease;
    }

    .preview-modal.is-active {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .preview-modal__backdrop {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(127, 209, 255, 0.08), transparent 42%),
        rgba(4, 10, 16, 0.24);
      backdrop-filter: blur(16px) saturate(115%);
    }

    .preview-modal__content {
      position: relative;
      width: min(78vw, 1240px);
      height: min(78vh, 860px);
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .preview-modal__slot {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .preview-modal .spine-card.is-modal-card {
      width: 100%;
      height: 100%;
      min-height: 0;
      border-radius: 24px;
      border: 1px solid rgba(127, 209, 255, 0.18);
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.38);
      overflow: hidden;
      pointer-events: auto;
    }

    .preview-modal .spine-card.is-modal-card .spine-toolbar {
      min-height: 0;
      padding: 12px 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      border-bottom: 1px solid rgba(127, 209, 255, 0.14);
    }

    .preview-modal .spine-card.is-modal-card .download-check,
    .preview-modal .spine-card.is-modal-card .skin-select {
      display: none !important;
    }

    .preview-modal .spine-card.is-modal-card .spine-name {
      flex: 0 1 auto;
      max-width: 36vw;
      text-align: center;
      font-size: 14px;
    }

    .preview-modal .spine-card.is-modal-card .animation-select {
      max-width: 180px;
    }

    .preview-modal .spine-card.is-modal-card .icon-button {
      min-width: 84px;
    }

    .preview-modal .spine-card.is-modal-card .toolbar-export-progress {
      display: inline-flex;
      min-width: 136px;
      max-width: 152px;
    }

    .preview-modal .spine-card.is-modal-card .toolbar-export-progress[hidden] {
      display: none !important;
    }

    .preview-modal .spine-card.is-modal-card .spine-preview {
      flex: 1;
      min-height: 0;
    }

    @media (max-width: 1600px) {
      .spine-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }

    @media (max-width: 1280px) {
      .spine-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 900px) {
      .input-row {
        grid-template-columns: 1fr;
      }

      .action-group {
        justify-content: stretch;
      }

      .action-group .action-button {
        flex: 1 1 calc(50% - 5px);
      }

      .spine-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .activity-picker {
        justify-content: flex-end;
      }

      .activity-picker__panel {
        width: min(100vw, 440px);
        padding: 16px;
        border-radius: 20px 0 0 20px;
      }

      .activity-picker__resize {
        display: none;
      }
    }

    @media (max-width: 640px) {
      .app-shell {
        padding: 12px;
      }

      .hero,
      .status-panel,
      .grid-shell {
        border-radius: 18px;
      }

      .status-main {
        width: 100%;
      }

      .status-text {
        flex-wrap: wrap;
      }

      .spine-grid {
        grid-template-columns: 1fr;
      }

      .spine-toolbar {
        grid-template-columns: auto minmax(0, 1fr);
      }
    }
  </style>
</head>
<body>
  <button
    id="activityPickerButton"
    class="corner-picker"
    type="button"
    title="选择预设活动链接"
    aria-label="选择预设活动链接">
    <span class="corner-picker__glyph">▼</span>
  </button>

  <div class="app-shell">
    <section class="hero" aria-label="提取控制区">
      <div class="input-row">
        <input
          id="urlInput"
          class="url-input"
          type="url"
          spellcheck="false"
          placeholder="请输入活动页面链接">
        <div class="action-group">
          <button id="localFolderButton" class="action-button" type="button">选择文件夹</button>
          <button id="extractButton" class="action-button" type="button">开始提取</button>
          <button id="downloadButton" class="action-button" type="button" disabled>下载所选</button>
        </div>
        <input
          id="localFolderInput"
          class="hidden-file-input"
          type="file"
          multiple
          webkitdirectory
          directory>
      </div>
    </section>

    <section class="status-panel" aria-live="polite">
      <div class="status-main">
        <p id="statusText" class="status-text" data-tone="idle">
          <span id="statusTextLabel" class="status-text__label">等待提取。</span>
          <span id="gifExportStatus" class="gif-export-status" hidden>
            <span id="gifExportLabel" class="gif-export-status__label"></span>
            <span class="mini-progress-track gif-export-status__track">
              <span id="gifExportFill" class="mini-progress-fill"></span>
            </span>
            <span id="gifExportValue" class="gif-export-status__value">0%</span>
          </span>
        </p>
      </div>
      <div class="status-badges">
        <span id="groupBadge" class="badge">Spine: 0</span>
        <span id="selectedBadge" class="badge">已选: 0</span>
      </div>
    </section>

    <section class="grid-shell">
      <div id="gridContainer" class="spine-grid"></div>
      <div id="emptyState" class="empty-state">输入活动页面链接，或选择本地文件 / 文件夹开始预览。</div>
    </section>
  </div>

  <div id="previewModal" class="preview-modal" aria-hidden="true">
    <div class="preview-modal__backdrop" data-modal-close></div>
    <div class="preview-modal__content">
      <div id="previewModalSlot" class="preview-modal__slot"></div>
    </div>
  </div>

  <div id="activityPickerModal" class="activity-picker" aria-hidden="true">
    <div class="activity-picker__backdrop" data-activity-picker-close></div>
    <section id="activityPickerPanel" class="activity-picker__panel" aria-label="活动链接列表">
      <button
        id="activityPickerResize"
        class="activity-picker__resize"
        type="button"
        title="拖动调整宽度"
        aria-label="拖动调整宽度"></button>
      <header class="activity-picker__header">
        <div>
          <h2 class="activity-picker__title">选择活动链接</h2>
          <p class="activity-picker__meta">从项目内 JSON 读取预设活动地址，单选后自动回填到输入框。</p>
        </div>
        <button
          id="activityPickerCloseButton"
          class="activity-picker__close"
          type="button"
          title="关闭"
          aria-label="关闭活动链接弹窗">×</button>
      </header>
      <div id="activityPickerList" class="activity-picker__list"></div>
      <div id="activityPickerEmpty" class="activity-picker__empty" hidden>正在读取活动链接列表...</div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/gh/EsotericSoftware/spine-runtimes@3.8/spine-ts/build/spine-player.js"></script>
  <script>
    window.SpineRuntimeRegistry = window.SpineRuntimeRegistry || {};
    window.SpineRuntimeRegistry["3.8"] = window.spine || window.SpineRuntimeRegistry["3.8"];
    window.spine = void 0;
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@esotericsoftware/spine-player@4.0.30/dist/iife/spine-player.min.js"></script>
  <script>
    window.SpineRuntimeRegistry = window.SpineRuntimeRegistry || {};
    window.SpineRuntimeRegistry["4.0"] = window.spine || window.SpineRuntimeRegistry["4.0"];
    window.spine = void 0;
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@esotericsoftware/spine-player@4.1.24/dist/iife/spine-player.min.js"></script>
  <script>
    window.SpineRuntimeRegistry = window.SpineRuntimeRegistry || {};
    window.SpineRuntimeRegistry["4.1"] = window.spine || window.SpineRuntimeRegistry["4.1"];
    window.spine = void 0;
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@esotericsoftware/spine-player@4.2.73/dist/iife/spine-player.min.js"></script>
  <script>
    window.SpineRuntimeRegistry = window.SpineRuntimeRegistry || {};
    window.SpineRuntimeRegistry["4.2"] = window.spine || window.SpineRuntimeRegistry["4.2"];
    window.spine = void 0;
  </script>
  <script src="https://cdn.jsdelivr.net/npm/gif.js.optimized/dist/gif.js"></script>
  <script src="./app.js"></script>
</body>
</html>
