<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Spine 提取预览器</title>
  <link rel="icon" type="image/png" sizes="32x32" href="https://esotericsoftware.com/files/branding/spine_badge.png">
  <link rel="shortcut icon" href="https://esotericsoftware.com/files/branding/spine_badge.png">
  <link rel="apple-touch-icon" href="https://esotericsoftware.com/files/branding/spine_badge.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/EsotericSoftware/spine-runtimes@3.8/spine-ts/player/css/spine-player.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@esotericsoftware/spine-player@4.2.73/dist/spine-player.min.css">
  <style>
    :root {
      --bg-0: #eaf7ff;
      --bg-1: #9fd4b1;
      --bg-2: #78b8d9;
      --panel: #ffffff;
      --panel-strong: #ffffff;
      --line: rgba(120, 184, 217, 0.35);
      --line-strong: rgba(120, 184, 217, 0.56);
      --text-0: #172437;
      --text-1: #4e5f74;
      --accent: #78b8d9;
      --accent-strong: #e9d08a;
      --glow-a: rgba(120, 184, 217, 0.2);
      --glow-b: rgba(159, 212, 177, 0.18);
      --surface-0: #ffffff;
      --surface-1: #f6fbff;
      --surface-2: #f2f8ff;
      --surface-soft: #eef6ff;
      --surface-muted: #e9f2fb;
      --overlay-bg: rgba(246, 251, 255, 0.82);
      --danger: #dd6b64;
      --success: #4f9966;
      --shadow: 0 18px 40px rgba(41, 65, 98, 0.16);
      color-scheme: light;
    }

    :root[data-theme="mondstadt"] {
      --bg-0: #eaf7ff;
      --bg-1: #9fd4b1;
      --bg-2: #78b8d9;
      --accent: #78b8d9;
      --accent-strong: #e9d08a;
      --line: rgba(120, 184, 217, 0.35);
      --line-strong: rgba(120, 184, 217, 0.56);
      --glow-a: rgba(120, 184, 217, 0.2);
      --glow-b: rgba(159, 212, 177, 0.18);
    }

    :root[data-theme="liyue"] {
      --bg-0: #f8f1e5;
      --bg-1: #5d7c66;
      --bg-2: #c8953c;
      --accent: #c8953c;
      --accent-strong: #d4b77e;
      --line: rgba(200, 149, 60, 0.34);
      --line-strong: rgba(200, 149, 60, 0.56);
      --glow-a: rgba(200, 149, 60, 0.2);
      --glow-b: rgba(93, 124, 102, 0.16);
    }

    :root[data-theme="inazuma"] {
      --bg-0: #ece9fa;
      --bg-1: #3b4e78;
      --bg-2: #6e63b9;
      --accent: #6e63b9;
      --accent-strong: #e7a9d4;
      --line: rgba(110, 99, 185, 0.34);
      --line-strong: rgba(110, 99, 185, 0.56);
      --glow-a: rgba(110, 99, 185, 0.2);
      --glow-b: rgba(59, 78, 120, 0.16);
    }

    :root[data-theme="sumeru"] {
      --bg-0: #eef7e8;
      --bg-1: #a7be64;
      --bg-2: #4f9966;
      --accent: #4f9966;
      --accent-strong: #cda760;
      --line: rgba(79, 153, 102, 0.34);
      --line-strong: rgba(79, 153, 102, 0.54);
      --glow-a: rgba(79, 153, 102, 0.2);
      --glow-b: rgba(167, 190, 100, 0.18);
    }

    :root[data-theme="fontaine"] {
      --bg-0: #eaf6ff;
      --bg-1: #7dcfe6;
      --bg-2: #4ca5d9;
      --accent: #4ca5d9;
      --accent-strong: #c4d6e5;
      --line: rgba(76, 165, 217, 0.34);
      --line-strong: rgba(76, 165, 217, 0.54);
      --glow-a: rgba(76, 165, 217, 0.2);
      --glow-b: rgba(125, 207, 230, 0.18);
    }

    :root[data-theme="natlan"] {
      --bg-0: #fff1e6;
      --bg-1: #a33d21;
      --bg-2: #e4682c;
      --accent: #e4682c;
      --accent-strong: #f0b248;
      --line: rgba(228, 104, 44, 0.36);
      --line-strong: rgba(228, 104, 44, 0.58);
      --glow-a: rgba(228, 104, 44, 0.22);
      --glow-b: rgba(163, 61, 33, 0.18);
    }

    :root[data-theme="snezhnaya"] {
      --bg-0: #eef4fa;
      --bg-1: #5c738e;
      --bg-2: #8cb7d9;
      --accent: #8cb7d9;
      --accent-strong: #d96e6e;
      --line: rgba(140, 183, 217, 0.34);
      --line-strong: rgba(140, 183, 217, 0.56);
      --glow-a: rgba(140, 183, 217, 0.2);
      --glow-b: rgba(92, 115, 142, 0.16);
    }

    :root[data-theme="moon"] {
      --bg-0: #eef1fa;
      --bg-1: #55789b;
      --bg-2: #7f9ccf;
      --accent: #7f9ccf;
      --accent-strong: #c9bedf;
      --line: rgba(127, 156, 207, 0.34);
      --line-strong: rgba(127, 156, 207, 0.56);
      --glow-a: rgba(127, 156, 207, 0.2);
      --glow-b: rgba(85, 120, 155, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "Segoe UI Variable", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text-0);
      background:
        radial-gradient(circle at top left, var(--glow-a), transparent 26%),
        radial-gradient(circle at right top, var(--glow-b), transparent 24%),
        linear-gradient(140deg, var(--bg-0), var(--bg-1) 56%, var(--bg-2) 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 26px 26px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.52), transparent 92%);
    }

    .app-shell {
      position: relative;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .corner-picker {
      position: fixed;
      top: 0;
      right: 0;
      width: 76px;
      height: 76px;
      padding: 0;
      border: 0;
      background:
        linear-gradient(135deg, var(--accent), var(--accent-strong));
      clip-path: polygon(100% 0, 0 0, 100% 100%);
      box-shadow: -10px 10px 30px rgba(2, 14, 24, 0.24);
      cursor: pointer;
      z-index: 90;
      transition: transform 0.2s ease, filter 0.2s ease;
    }

    .corner-picker:hover,
    .corner-picker:focus-visible {
      transform: translateY(-1px);
      filter: brightness(1.06);
      outline: none;
    }

    .corner-picker__glyph {
      position: absolute;
      top: 11px;
      right: 12px;
      width: 24px;
      height: 24px;
      display: block;
      background-image: url("https://genshin.hoyoverse.com/favicon.ico");
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;
      color: transparent;
      font-size: 0;
      line-height: 0;
      filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.2));
    }

    .corner-picker__glyph::after {
      content: "";
      position: absolute;
      right: -2px;
      bottom: -2px;
      width: 0;
      height: 0;
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-top: 6px solid rgba(5, 32, 50, 0.85);
    }

    .activity-picker {
      position: fixed;
      inset: 0;
      z-index: 130;
      display: flex;
      align-items: stretch;
      justify-content: flex-end;
      padding: 0;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.22s ease, visibility 0.22s ease;
    }

    .activity-picker.is-active {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .activity-picker__backdrop {
      position: absolute;
      inset: 0;
      background: transparent;
    }

    .activity-picker__panel {
      position: relative;
      width: clamp(380px, 33.333vw, 620px);
      height: 100%;
      max-height: none;
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 20px 18px 18px;
      border-radius: 26px 0 0 26px;
      border-top: 0;
      border-right: 0;
      border-bottom: 0;
      border-left: 1px solid var(--line);
      background:
        radial-gradient(circle at top right, color-mix(in srgb, var(--accent) 18%, transparent), transparent 34%),
        linear-gradient(180deg, color-mix(in srgb, var(--accent-strong) 10%, transparent), transparent),
        var(--surface-2);
      box-shadow: -24px 0 60px rgba(0, 0, 0, 0.28);
      overflow: hidden;
      transform: translateX(16px);
      transition: transform 0.22s ease;
    }

    .activity-picker__resize {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 16px;
      padding: 0;
      border: 0;
      background: transparent;
      cursor: ew-resize;
      z-index: 2;
    }

    .activity-picker__resize::before {
      content: "";
      position: absolute;
      left: 4px;
      top: 50%;
      width: 4px;
      height: 68px;
      border-radius: 999px;
      transform: translateY(-50%);
      background:
        linear-gradient(180deg, color-mix(in srgb, var(--accent) 26%, transparent), color-mix(in srgb, var(--accent) 56%, transparent), color-mix(in srgb, var(--accent) 26%, transparent));
      box-shadow: 0 0 18px color-mix(in srgb, var(--accent-strong) 24%, transparent);
      transition: background 0.2s ease, box-shadow 0.2s ease;
    }

    .activity-picker__resize:hover::before,
    .activity-picker__resize:focus-visible::before {
      background:
        linear-gradient(180deg, color-mix(in srgb, var(--accent) 42%, transparent), color-mix(in srgb, var(--accent) 76%, transparent), color-mix(in srgb, var(--accent) 42%, transparent));
      box-shadow: 0 0 24px color-mix(in srgb, var(--accent-strong) 34%, transparent);
    }

    .activity-picker__resize:focus-visible {
      outline: none;
    }

    .activity-picker.is-active .activity-picker__panel {
      transform: translateX(0);
    }

    .activity-picker__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .activity-picker__title {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0.02em;
    }

    .activity-picker__meta {
      margin: 4px 0 0;
      color: var(--text-1);
      font-size: 12px;
      line-height: 1.6;
    }

    .activity-picker__tools {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 0;
      padding: 0 2px 6px;
    }

    .activity-theme-label {
      color: var(--text-1);
      font-size: 12px;
      display: none !important;
    }

    .activity-theme-select {
      min-width: 170px;
      height: 34px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: var(--surface-0);
      color: var(--text-0);
      font: inherit;
      font-size: 12px;
      padding: 0 10px;
    }

    .activity-theme-select:focus {
      outline: none;
      border-color: var(--line-strong);
    }

    .activity-picker__close {
      width: 34px;
      height: 34px;
      padding: 0;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--surface-0);
      color: var(--text-0);
      font: inherit;
      cursor: pointer;
    }

    .activity-picker__close:hover,
    .activity-picker__close:focus-visible {
      border-color: var(--line-strong);
      outline: none;
    }

    .activity-picker__list {
      min-height: 240px;
      max-height: none;
      flex: 1;
      padding-right: 4px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
    }

    .activity-picker__empty {
      min-height: 240px;
      display: grid;
      place-items: center;
      padding: 20px;
      text-align: center;
      color: var(--text-1);
      border: 1px dashed color-mix(in srgb, var(--accent) 22%, transparent);
      border-radius: 16px;
      background: var(--surface-muted);
      line-height: 1.8;
    }

    .activity-picker__empty[hidden] {
      display: none;
    }

    body.is-resizing-activity-picker,
    body.is-resizing-activity-picker * {
      cursor: ew-resize !important;
      user-select: none !important;
    }

    .activity-option {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 14px;
      border: 1px solid color-mix(in srgb, var(--accent) 18%, transparent);
      border-radius: 16px;
      background: var(--surface-soft);
      cursor: pointer;
      transition: border-color 0.2s ease, transform 0.2s ease, background 0.2s ease;
    }

    .activity-option:hover,
    .activity-option:focus-within {
      border-color: var(--line-strong);
      background: var(--surface-1);
      transform: translateY(-1px);
    }

    .activity-option input[type="radio"] {
      margin: 4px 0 0;
      accent-color: var(--accent-strong);
    }

    .activity-option__body {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .activity-option__name {
      color: var(--text-0);
      font-size: 14px;
      font-weight: 600;
      line-height: 1.5;
    }

    .activity-option__url {
      color: var(--text-1);
      font-size: 12px;
      line-height: 1.6;
      word-break: break-all;
    }

    .hero,
    .status-panel,
    .grid-shell {
      border: 1px solid var(--line);
      border-radius: 22px;
      background: var(--panel);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 18px;
      display: grid;
      gap: 12px;
    }

    .hero-title {
      margin: 0;
      font-size: clamp(24px, 3vw, 34px);
      letter-spacing: 0.04em;
    }

    .hero-subtitle {
      margin: 0;
      color: var(--text-1);
      line-height: 1.7;
    }

    .input-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: stretch;
    }

    .action-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .url-input,
    .action-button {
      min-height: 48px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: var(--surface-0);
      color: var(--text-0);
      font: inherit;
      transition: border-color 0.2s ease, transform 0.2s ease, background 0.2s ease;
    }

    .url-input {
      width: 100%;
      padding: 0 16px;
    }

    .url-input::placeholder {
      color: color-mix(in srgb, var(--text-0) 48%, transparent);
    }

    .action-button {
      min-width: 116px;
      padding: 0 18px;
      cursor: pointer;
      font-weight: 700;
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--accent-strong) 24%, transparent), color-mix(in srgb, var(--accent) 10%, transparent)),
        var(--surface-0);
    }

    .url-input:hover,
    .url-input:focus,
    .action-button:hover {
      border-color: var(--line-strong);
      outline: none;
      transform: translateY(-1px);
    }

    .action-button:disabled,
    .url-input:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      transform: none;
    }

    .hidden-file-input {
      display: none;
    }

    .status-panel {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .status-main {
      min-width: min(100%, 320px);
      flex: 1 1 360px;
      display: flex;
      align-items: center;
    }

    .status-text {
      margin: 0;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: nowrap;
      color: var(--text-1);
      line-height: 1.6;
    }

    .status-text__label {
      min-width: 0;
      white-space: pre-line;
    }

    .status-text[data-tone="success"] {
      color: var(--success);
    }

    .status-text[data-tone="error"] {
      color: var(--danger);
    }

    .status-text[data-tone="loading"] {
      color: var(--accent);
    }

    .gif-export-status {
      display: none;
      flex: 0 1 auto;
      gap: 10px;
      min-width: 0;
      max-width: min(100%, 620px);
    }

    .gif-export-status.is-active {
      display: inline-flex;
      align-items: center;
    }

    .gif-export-status[hidden] {
      display: none !important;
    }

    .gif-export-status__label {
      flex: 0 1 auto;
      min-width: 0;
      max-width: min(36vw, 400px);
      color: inherit;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .gif-export-status__track {
      width: 122px;
      flex: 0 0 122px;
    }

    .gif-export-status__value,
    .toolbar-export-progress__value {
      display: inline-block;
      flex: 0 0 auto;
      min-width: 32px;
      color: var(--accent);
      font-size: 11px;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      text-align: right;
    }

    .mini-progress-track {
      display: block;
      position: relative;
      height: 6px;
      border-radius: 999px;
      overflow: hidden;
      background:
        linear-gradient(90deg, color-mix(in srgb, var(--accent) 14%, transparent), color-mix(in srgb, var(--accent) 7%, transparent));
      box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--accent) 10%, transparent);
    }

    .mini-progress-fill {
      display: block;
      width: 0;
      height: 100%;
      border-radius: inherit;
      background:
        linear-gradient(90deg, color-mix(in srgb, var(--accent) 94%, #ffffff 6%), color-mix(in srgb, var(--accent) 96%, transparent) 46%, color-mix(in srgb, var(--accent-strong) 98%, transparent));
      box-shadow: 0 0 18px color-mix(in srgb, var(--accent-strong) 44%, transparent);
      transition: width 0.22s ease;
    }

    .status-badges {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .badge {
      min-height: 32px;
      display: inline-flex;
      align-items: center;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--surface-soft);
      color: var(--text-1);
      font-size: 13px;
      white-space: nowrap;
    }

    .grid-shell {
      padding: 16px;
    }

    .spine-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
    }

    .empty-state {
      min-height: 280px;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
      color: var(--text-1);
      line-height: 1.8;
      border: 1px dashed color-mix(in srgb, var(--accent) 24%, transparent);
      border-radius: 18px;
      background:
        radial-gradient(circle at center, color-mix(in srgb, var(--accent) 10%, transparent), transparent 46%),
        var(--surface-muted);
    }

    .spine-card {
      min-width: 0;
      border: 1px solid color-mix(in srgb, var(--accent) 18%, transparent);
      border-radius: 18px;
      background: var(--panel-strong);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 300px;
    }

    .spine-toolbar {
      min-height: 42px;
      padding: 8px 10px;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto auto auto;
      gap: 6px;
      align-items: center;
      border-bottom: 1px solid color-mix(in srgb, var(--accent) 16%, transparent);
      background:
        linear-gradient(180deg, color-mix(in srgb, var(--accent-strong) 10%, transparent), transparent),
        var(--surface-1);
    }

    .download-check {
      width: 16px;
      height: 16px;
      margin: 0;
      accent-color: var(--accent-strong);
    }

    .spine-name {
      min-width: 0;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text-0);
    }

    .spine-name-input {
      width: 100%;
      max-width: none;
      min-width: 0;
      grid-column: 2;
      padding: 0 8px;
    }

    .frame-scrubber {
      display: none;
      align-items: center;
      gap: 6px;
      min-width: 132px;
      max-width: 176px;
    }

    .frame-scrubber[hidden] {
      display: none !important;
    }

    .frame-scrubber__input {
      width: 100%;
      accent-color: var(--accent-strong);
      cursor: pointer;
    }

    .frame-scrubber__value {
      min-width: 34px;
      font-size: 11px;
      color: var(--text-1);
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .frame-scrubber__play-button {
      height: 24px;
      padding: 0 8px;
      border-radius: 8px;
      border: 1px solid color-mix(in srgb, var(--accent) 28%, transparent);
      background: var(--surface-1);
      color: var(--text-0);
      font-size: 11px;
      cursor: pointer;
      white-space: nowrap;
    }

    .frame-scrubber__step-button {
      min-width: 28px;
      padding: 0 6px;
      font-weight: 700;
    }

    .frame-scrubber__play-button.is-active {
      border-color: color-mix(in srgb, var(--accent) 54%, transparent);
      background: color-mix(in srgb, var(--accent-strong) 22%, transparent);
    }

    .mini-select,
    .icon-button {
      min-width: 0;
      height: 26px;
      border-radius: 9px;
      border: 1px solid var(--line);
      background: var(--surface-0);
      color: var(--text-0);
      font: inherit;
      font-size: 12px;
    }

    .mini-select {
      max-width: 84px;
      padding: 0 8px;
    }

    .mini-select.spine-name-input {
      max-width: none;
      width: 100%;
    }

    .icon-button {
      min-width: 40px;
      padding: 0 10px;
      cursor: pointer;
    }

    .toolbar-export-progress {
      display: none;
      align-items: center;
      gap: 8px;
      min-width: 114px;
      max-width: 136px;
    }

    .toolbar-export-progress[hidden] {
      display: none !important;
    }

    .toolbar-export-progress__track {
      flex: 1 1 auto;
      min-width: 74px;
    }

    .mini-select:hover,
    .mini-select:focus,
    .icon-button:hover {
      border-color: var(--line-strong);
      outline: none;
    }

    .spine-preview {
      position: relative;
      flex: 1;
      min-height: 258px;
      overflow: hidden;
      background:
        radial-gradient(circle at top, color-mix(in srgb, var(--accent) 10%, transparent), transparent 36%),
        linear-gradient(180deg, var(--surface-2), color-mix(in srgb, var(--bg-2) 90%, #05090d 10%));
    }

    .spine-preview::before {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 14px;
      border: 1px solid color-mix(in srgb, var(--accent) 10%, transparent);
      pointer-events: none;
    }

    .player-mount {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .player-mount,
    .player-mount > div,
    .player-mount .spine-player {
      width: 100%;
      height: 100%;
    }

    .player-mount canvas {
      width: 100% !important;
      height: 100% !important;
    }

    .card-overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 16px;
      text-align: center;
      color: var(--text-1);
      line-height: 1.7;
      background: var(--overlay-bg);
      transition: opacity 0.2s ease, visibility 0.2s ease;
      white-space: pre-line;
    }

    .card-overlay.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .spine-card-placeholder {
      min-height: 300px;
      border-radius: 18px;
      border: 1px dashed color-mix(in srgb, var(--accent) 16%, transparent);
      background: color-mix(in srgb, var(--bg-0) 38%, transparent);
    }

    .preview-modal {
      position: fixed;
      inset: 0;
      z-index: 120;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.22s ease, visibility 0.22s ease;
    }

    .preview-modal.is-active {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .preview-modal__backdrop {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center, color-mix(in srgb, var(--accent) 10%, transparent), transparent 42%),
        color-mix(in srgb, var(--bg-0) 45%, rgba(4, 10, 16, 0.24));
      backdrop-filter: blur(16px) saturate(115%);
    }

    .preview-modal__content {
      position: relative;
      width: min(78vw, 1240px);
      height: min(78vh, 860px);
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .preview-modal__slot {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .preview-modal .spine-card.is-modal-card {
      width: 100%;
      height: 100%;
      min-height: 0;
      border-radius: 24px;
      border: 1px solid var(--line);
      box-shadow: 0 22px 64px rgba(0, 0, 0, 0.26);
      overflow: hidden;
      pointer-events: auto;
    }

    .preview-modal .spine-card.is-modal-card .spine-toolbar {
      min-height: 0;
      padding: 12px 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      border-bottom: 1px solid color-mix(in srgb, var(--accent) 18%, transparent);
    }

    .preview-modal .spine-card.is-modal-card .download-check,
    .preview-modal .spine-card.is-modal-card .skin-select {
      display: none !important;
    }

    .preview-modal .spine-card.is-modal-card .spine-name {
      flex: 0 1 auto;
      max-width: 36vw;
      text-align: center;
      font-size: 14px;
    }

    .preview-modal .spine-card.is-modal-card .spine-name-input {
      flex: 0 1 36vw;
      max-width: 36vw;
      grid-column: auto;
    }

    .preview-modal .spine-card.is-modal-card .animation-select {
      max-width: 180px;
    }

    .preview-modal .spine-card.is-modal-card .frame-scrubber {
      display: inline-flex;
      min-width: 220px;
      max-width: 320px;
    }

    .preview-modal .spine-card.is-modal-card .icon-button {
      min-width: 84px;
    }

    .preview-modal .spine-card.is-modal-card .toolbar-export-progress {
      display: inline-flex;
      min-width: 136px;
      max-width: 152px;
    }

    .preview-modal .spine-card.is-modal-card .toolbar-export-progress[hidden] {
      display: none !important;
    }

    .preview-modal .spine-card.is-modal-card .spine-preview {
      flex: 1;
      min-height: 0;
      position: relative;
    }

    .fullscreen-debug-controls {
      position: absolute;
      right: 10px;
      bottom: 10px;
      z-index: 12;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .fullscreen-debug-menu {
      position: relative;
    }

    .fullscreen-debug-mini-button {
      width: 26px;
      min-width: 26px;
      height: 24px;
      padding: 0;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 7px;
      background: rgba(10, 12, 16, 0.82);
      color: #fff;
      font-size: 13px;
      cursor: pointer;
      line-height: 1;
    }

    .fullscreen-debug-mini-button:hover {
      border-color: rgba(255, 255, 255, 0.38);
      background: rgba(10, 12, 16, 0.94);
    }

    .fullscreen-debug-popup {
      position: absolute;
      right: 0;
      bottom: calc(100% + 6px);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(8, 10, 14, 0.9);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(6px);
    }

    .fullscreen-debug-popup[hidden] {
      display: none !important;
    }

    .fullscreen-debug-popup--debug {
      flex-direction: column;
      align-items: stretch;
      right: 0;
      bottom: calc(100% + 6px);
    }

    .fullscreen-debug-controls__item {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      color: #fff;
      white-space: nowrap;
      line-height: 1;
    }

    .fullscreen-debug-controls__toggle input {
      display: none;
    }

    .fullscreen-debug-controls__toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 22px;
      padding: 0;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.06);
      cursor: pointer;
      user-select: none;
      font-size: 12px;
    }

    .fullscreen-debug-controls__toggle:has(input:checked) {
      border-color: rgba(117, 207, 230, 0.76);
      background: rgba(117, 207, 230, 0.2);
    }

    .fullscreen-debug-controls__speed {
      min-width: 60px;
      height: 22px;
      font-size: 10px;
      padding: 0 6px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      background: rgba(0, 0, 0, 0.45);
      color: #fff;
    }

    .fullscreen-debug-trail {
      position: absolute;
      inset: 0;
      z-index: 11;
      pointer-events: none;
    }

    /* Option C minimal visual override: keep behavior, simplify appearance */
    body {
      background: var(--bg-0) !important;
      color: var(--text-0);
      font-family: "Noto Sans SC", "Segoe UI", sans-serif;
    }

    body::before {
      display: none !important;
    }

    .app-shell {
      max-width: 1200px;
      margin: 0 auto;
      padding: 18px 14px 26px;
      gap: 12px;
    }

    .corner-picker {
      top: -1px;
      right: -1px;
      width: 78px;
      height: 78px;
      padding: 0;
      border: 1px solid color-mix(in srgb, var(--line) 72%, transparent);
      clip-path: polygon(100% 0, 0 0, 100% 100%);
      border-radius: 0;
      background:
        linear-gradient(
          140deg,
          color-mix(in srgb, var(--bg-0) 82%, var(--accent) 18%),
          color-mix(in srgb, var(--bg-1) 76%, #ffffff 24%)
        );
      backdrop-filter: blur(9px);
      -webkit-backdrop-filter: blur(9px);
      box-shadow: -6px 6px 14px color-mix(in srgb, var(--bg-2) 20%, transparent);
    }

    .corner-picker:hover,
    .corner-picker:focus-visible {
      transform: translateY(-1px);
      filter: none;
      border-color: color-mix(in srgb, var(--accent) 38%, transparent);
      background:
        linear-gradient(
          140deg,
          color-mix(in srgb, var(--bg-0) 78%, var(--accent) 22%),
          color-mix(in srgb, var(--bg-1) 70%, #ffffff 30%)
        );
    }

    .corner-picker__glyph {
      position: absolute;
      top: 11px;
      right: 12px;
      width: 24px;
      height: 24px;
      margin: 0;
      filter: drop-shadow(0 1px 2px color-mix(in srgb, var(--bg-2) 32%, transparent));
      opacity: 0.86;
    }

    .corner-picker__glyph::after {
      content: "";
      position: absolute;
      right: -2px;
      bottom: -2px;
      width: 0;
      height: 0;
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-top: 6px solid color-mix(in srgb, var(--text-0) 38%, transparent);
    }

    .hero,
    .status-panel,
    .grid-shell,
    .spine-card,
    .activity-picker__panel,
    .preview-modal__content {
      background: #fff !important;
      border: 1px solid var(--line) !important;
      border-radius: 14px !important;
      box-shadow: none !important;
      backdrop-filter: none !important;
    }

    .hero,
    .status-panel,
    .grid-shell {
      padding: 14px;
    }

    .input-row {
      gap: 10px;
    }

    .url-input,
    .mini-select,
    .activity-theme-select {
      background: #fff !important;
      border: 1px solid var(--line) !important;
      border-radius: 10px !important;
      color: var(--text-0) !important;
      box-shadow: none !important;
    }

    .url-input:focus,
    .mini-select:focus,
    .activity-theme-select:focus {
      border-color: var(--accent) !important;
      outline: none !important;
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 20%, #fff 80%) !important;
    }

    .action-button,
    .icon-button,
    .activity-picker__close {
      background: #fff !important;
      color: var(--text-0) !important;
      border: 1px solid var(--line) !important;
      border-radius: 10px !important;
      box-shadow: none !important;
    }

    .action-button:hover,
    .icon-button:hover,
    .activity-picker__close:hover {
      border-color: var(--accent) !important;
      background: color-mix(in srgb, #fff 82%, var(--accent) 18%) !important;
    }

    .status-text,
    .activity-picker__meta,
    .activity-option__url {
      color: var(--text-1) !important;
    }

    .badge,
    .activity-theme-label {
      border: 1px solid var(--line) !important;
      background: #fff !important;
      color: var(--text-1) !important;
    }

    .spine-grid {
      gap: 10px;
    }

    .spine-toolbar {
      border-bottom: 1px solid var(--line) !important;
      background: #fff !important;
    }

    .spine-name {
      color: var(--text-0) !important;
    }

    .spine-name-input {
      background: #fff !important;
    }

    .spine-preview {
      background: color-mix(in srgb, #fff 86%, var(--bg-0) 14%) !important;
      border: 1px dashed var(--line) !important;
      border-radius: 12px !important;
    }

    .card-overlay {
      background: color-mix(in srgb, #fff 92%, var(--bg-0) 8%) !important;
      border-color: var(--line) !important;
      backdrop-filter: none !important;
    }

    .frame-scrubber__input {
      accent-color: var(--accent);
    }

    .frame-scrubber__play-button {
      border: 1px solid var(--line) !important;
      background: #fff !important;
      color: var(--text-0) !important;
      box-shadow: none !important;
    }

    .frame-scrubber__play-button:hover {
      border-color: var(--accent) !important;
      background: color-mix(in srgb, #fff 82%, var(--accent) 18%) !important;
    }

    .mini-progress-track {
      background: color-mix(in srgb, #fff 78%, var(--accent) 22%) !important;
      box-shadow: inset 0 0 0 1px var(--line) !important;
    }

    .mini-progress-fill {
      background: var(--accent) !important;
      box-shadow: none !important;
    }

    .activity-picker {
      background: rgba(16, 24, 38, 0.18);
    }

    .activity-picker__panel {
      border-left: 1px solid var(--line) !important;
      transform: translateX(0) !important;
    }

    .activity-picker__resize,
    .activity-picker__resize::before {
      display: none !important;
    }

    .activity-option {
      border: 1px solid var(--line) !important;
      border-radius: 10px !important;
      background: #fff !important;
      box-shadow: none !important;
    }

    .activity-option:hover {
      border-color: var(--accent) !important;
      background: color-mix(in srgb, #fff 86%, var(--accent) 14%) !important;
    }

    .preview-modal {
      background: rgba(16, 24, 38, 0.2) !important;
    }

    .preview-modal .spine-card.is-modal-card {
      border-radius: 14px !important;
      box-shadow: none !important;
    }

    @media (max-width: 1600px) {
      .spine-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }

    @media (max-width: 1280px) {
      .spine-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 900px) {
      .input-row {
        grid-template-columns: 1fr;
      }

      .action-group {
        justify-content: stretch;
      }

      .action-group .action-button {
        flex: 1 1 calc(50% - 5px);
      }

      .spine-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .activity-picker {
        justify-content: flex-end;
      }

      .activity-picker__panel {
        width: min(100vw, 440px);
        padding: 16px;
        border-radius: 20px 0 0 20px;
      }

      .activity-picker__resize {
        display: none;
      }

      .activity-picker__tools {
        flex-direction: column;
        align-items: stretch;
      }

      .activity-theme-select {
        width: 100%;
        min-width: 0;
      }
    }

    @media (max-width: 640px) {
      .app-shell {
        padding: 12px;
      }

      .hero,
      .status-panel,
      .grid-shell {
        border-radius: 18px;
      }

      .status-main {
        width: 100%;
      }

      .status-text {
        flex-wrap: wrap;
      }

      .spine-grid {
        grid-template-columns: 1fr;
      }

      .spine-toolbar {
        grid-template-columns: auto minmax(0, 1fr);
      }
    }
  </style>
</head>
<body>
  <button
    id="activityPickerButton"
    class="corner-picker"
    type="button"
    title="选择预设活动链接"
    aria-label="选择预设活动链接">
    <span class="corner-picker__glyph">▼</span>
  </button>

  <div class="app-shell">
    <section class="hero" aria-label="提取控制区">
      <div class="input-row">
        <input
          id="urlInput"
          class="url-input"
          type="url"
          spellcheck="false"
          placeholder="请输入活动页面链接">
        <div class="action-group">
          <button id="localFolderButton" class="action-button" type="button">选择文件夹</button>
          <button id="extractButton" class="action-button" type="button">开始提取</button>
          <button id="downloadButton" class="action-button" type="button" disabled>下载所选</button>
        </div>
        <input
          id="localFolderInput"
          class="hidden-file-input"
          type="file"
          multiple
          webkitdirectory
          directory>
      </div>
    </section>

    <section class="status-panel" aria-live="polite">
      <div class="status-main">
        <p id="statusText" class="status-text" data-tone="idle">
          <span id="statusTextLabel" class="status-text__label">等待提取。</span>
          <span id="gifExportStatus" class="gif-export-status" hidden>
            <span id="gifExportLabel" class="gif-export-status__label"></span>
            <span class="mini-progress-track gif-export-status__track">
              <span id="gifExportFill" class="mini-progress-fill"></span>
            </span>
            <span id="gifExportValue" class="gif-export-status__value">0%</span>
          </span>
        </p>
      </div>
      <div class="status-badges">
        <span id="groupBadge" class="badge">Spine: 0</span>
        <span id="selectedBadge" class="badge">已选: 0</span>
      </div>
    </section>

    <section class="grid-shell">
      <div id="gridContainer" class="spine-grid"></div>
      <div id="emptyState" class="empty-state">输入活动页面链接，或选择本地文件 / 文件夹开始预览。</div>
    </section>
  </div>

  <div id="previewModal" class="preview-modal" aria-hidden="true">
    <div class="preview-modal__backdrop" data-modal-close></div>
    <div class="preview-modal__content">
      <div id="previewModalSlot" class="preview-modal__slot"></div>
    </div>
  </div>

  <div id="activityPickerModal" class="activity-picker" aria-hidden="true">
    <div class="activity-picker__backdrop" data-activity-picker-close></div>
    <section id="activityPickerPanel" class="activity-picker__panel" aria-label="活动链接列表">
      <button
        id="activityPickerResize"
        class="activity-picker__resize"
        type="button"
        title="拖动调整宽度"
        aria-label="拖动调整宽度"></button>
      <header class="activity-picker__header">
        <div>
          <h2 class="activity-picker__title">选择活动链接</h2>
          <p class="activity-picker__meta">从项目内 JSON 读取预设活动地址，单选后自动回填到输入框。</p>
        </div>
        <button
          id="activityPickerCloseButton"
          class="activity-picker__close"
          type="button"
          title="关闭"
          aria-label="关闭活动链接弹窗">×</button>
      </header>
      <div class="activity-picker__tools">
        <select id="themeSelect" class="activity-theme-select" title="切换全局配色主题">
          <option value="mondstadt">蒙德 · 自由清风</option>
          <option value="liyue">璃月 · 契约岩港</option>
          <option value="inazuma">稻妻 · 鸣雷永恒</option>
          <option value="sumeru">须弥 · 雨林智识</option>
          <option value="fontaine">枫丹 · 正义澄潮</option>
          <option value="natlan">纳塔 · 炽焰盟誓</option>
          <option value="snezhnaya">至冬 · 冰国极夜</option>
          <option value="moon">月国 · 霜月银辉</option>
        </select>
      </div>
      <div id="activityPickerList" class="activity-picker__list"></div>
      <div id="activityPickerEmpty" class="activity-picker__empty" hidden>正在读取活动链接列表...</div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/gh/EsotericSoftware/spine-runtimes@3.8/spine-ts/build/spine-player.js"></script>
  <script>
    window.SpineRuntimeRegistry = window.SpineRuntimeRegistry || {};
    window.SpineRuntimeRegistry["3.8"] = window.spine || window.SpineRuntimeRegistry["3.8"];
    window.spine = void 0;
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@esotericsoftware/spine-player@4.0.30/dist/iife/spine-player.min.js"></script>
  <script>
    window.SpineRuntimeRegistry = window.SpineRuntimeRegistry || {};
    window.SpineRuntimeRegistry["4.0"] = window.spine || window.SpineRuntimeRegistry["4.0"];
    window.spine = void 0;
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@esotericsoftware/spine-player@4.1.24/dist/iife/spine-player.min.js"></script>
  <script>
    window.SpineRuntimeRegistry = window.SpineRuntimeRegistry || {};
    window.SpineRuntimeRegistry["4.1"] = window.spine || window.SpineRuntimeRegistry["4.1"];
    window.spine = void 0;
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@esotericsoftware/spine-player@4.2.73/dist/iife/spine-player.min.js"></script>
  <script>
    window.SpineRuntimeRegistry = window.SpineRuntimeRegistry || {};
    window.SpineRuntimeRegistry["4.2"] = window.spine || window.SpineRuntimeRegistry["4.2"];
    window.spine = void 0;
  </script>
  <script src="https://cdn.jsdelivr.net/npm/gif.js.optimized/dist/gif.js"></script>
  <script src="./app.js"></script>
</body>
</html>
